name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Assemble debug
        run: ./gradlew assembleProdDebug --no-daemon

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Run unit tests
        run: ./gradlew testProdDebugUnitTest --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/

  lint:
    name: Lint (ktlint)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon

  release:
    name: Build (release)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/master'
    needs: [build, test, lint]
    env:
      KEYSTORE_PATH: my-upload-key.jks
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > my-upload-key.jks

      - name: Bundle release
        run: ./gradlew bundleProdRelease --no-daemon

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/prodRelease/

  # Required GitHub Secrets for this workflow:
  #   KEYSTORE_BASE64                — Base64-encoded keystore (base64 -w0 my-upload-key.jks)
  #   STORE_PASSWORD                 — Keystore password
  #   KEY_PASSWORD                   — Key alias password
  #   FIREBASE_SERVICE_ACCOUNT_JSON  — Firebase service account JSON (needs Firebase App Distribution Admin role)
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/master'
    needs: [release]

    steps:
      - uses: actions/checkout@v4

      - name: Download release AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/prodRelease/

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install gems
        run: bundle install

      - name: Write Firebase service account key
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > fastlane/play-store-key.json

      - name: Deploy to Firebase App Distribution
        run: bundle exec fastlane android deploy_firebase
